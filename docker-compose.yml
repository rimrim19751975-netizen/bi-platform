version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bi_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bi_platform?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: bi-platform-super-secret-key-change-in-production
      JWT_EXPIRES_IN: 24h
      JWT_REFRESH_SECRET: bi-platform-refresh-secret-key-change-in-production
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
      PORT: 5000
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 104857600
      APP_URL: http://localhost:3000
      API_URL: http://localhost:5000/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  exports:
